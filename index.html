<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>分镜生成器</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg,#1a0b2e 0%,#0b1a2e 50%,#0b2e2a 100%); min-height:100vh; color:#e5e7eb; font-family: system-ui,-apple-system,"Segoe UI",sans-serif; }
  .card { background: rgba(20,18,40,.6); backdrop-filter: blur(10px); border:1px solid rgba(139,92,246,.2); border-radius:12px; }
  .btn-primary { background: linear-gradient(90deg,#8b5cf6,#06b6d4); color:#fff; padding:8px 16px; border-radius:8px; font-weight:600; transition:opacity .2s; }
  .btn-primary:hover { opacity:.9; } .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .btn-ghost { padding:6px 12px; border-radius:6px; background:rgba(255,255,255,.06); color:#e5e7eb; }
  .btn-ghost:hover { background:rgba(255,255,255,.12); }
  .input, .textarea, .select { width:100%; background:rgba(0,0,0,.3); border:1px solid rgba(139,92,246,.3); border-radius:6px; padding:8px 12px; color:#e5e7eb; outline:none; }
  .input:focus, .textarea:focus, .select:focus { border-color:#8b5cf6; }
  .textarea { resize:vertical; min-height:120px; }
  .tab-btn { padding:8px 16px; border-radius:8px; color:#9ca3af; cursor:pointer; white-space:nowrap; }
  .tab-btn.active { background:linear-gradient(90deg,#8b5cf6,#06b6d4); color:#fff; }
  .shot-card { background:rgba(255,255,255,.04); border-left:3px solid #8b5cf6; padding:12px; border-radius:8px; margin-bottom:8px; white-space:pre-wrap; font-size:13px; line-height:1.6; }
  .asset-card { background:rgba(255,255,255,.04); border:1px solid rgba(139,92,246,.2); border-radius:8px; padding:12px; }
  .toast { position:fixed; top:20px; right:20px; padding:10px 16px; border-radius:8px; background:#1f2937; border:1px solid #8b5cf6; z-index:1000; color:#fff; animation:slide-in .3s ease; }
  @keyframes slide-in { from { opacity:0; transform:translateX(20px);} to { opacity:1; transform:translateX(0);} }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:900; display:flex; align-items:center; justify-content:center; }
  .modal-box { background:#1a0b2e; border:1px solid rgba(139,92,246,.4); border-radius:12px; padding:24px; width:min(560px,92vw); max-height:90vh; overflow:auto; }
  .streaming-dot::after { content:''; display:inline-block; width:8px; height:8px; border-radius:50%; background:#10b981; margin-left:6px; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:.3;} }
  .chapter-item { background:rgba(255,255,255,.04); border-radius:8px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; }
  .badge-pending { background:#374151; color:#d1d5db; }
  .badge-running { background:#7c3aed; color:#fff; }
  .badge-done { background:#10b981; color:#fff; }
  .badge-fail { background:#ef4444; color:#fff; }
</style>
</head>
<body>
<div class="max-w-6xl mx-auto p-4 md:p-6">
  <header class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-purple-400 to-cyan-400 bg-clip-text text-transparent">分镜生成器</h1>
    </div>
  </header>

  <nav class="flex gap-2 mb-4 overflow-x-auto card p-2">
    <button class="tab-btn active" data-tab="gen">✨ 生成</button>
    <button class="tab-btn" data-tab="assets">📚 素材库</button>
    <button class="tab-btn" data-tab="history">🕑 历史记录</button>
    <button class="tab-btn" data-tab="batch">📖 批量生成</button>
    <button class="tab-btn" data-tab="settings">⚙️ API 设置</button>
  </nav>

  <!-- 生成页 -->
  <section id="page-gen" class="page">
    <div class="card p-4 md:p-6 mb-4">
      <label class="block text-sm mb-1">小说文本</label>
      <textarea id="gen-text" class="textarea" placeholder="粘贴要生成分镜的小说文本..." style="min-height:160px"></textarea>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
        <div>
          <label class="block text-sm mb-1">节奏</label>
          <select id="gen-pace" class="select">
            <option value="slow">慢节奏</option>
            <option value="medium" selected>中等节奏</option>
            <option value="fast">快节奏</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">风格倾向（可选）</label>
          <input id="gen-style" class="input" placeholder="如：悬疑、爽文、古风..." />
        </div>
        <div>
          <label class="block text-sm mb-1">标题（可选）</label>
          <input id="gen-title" class="input" placeholder="留空自动生成" />
        </div>
      </div>
      <details class="mt-3">
        <summary class="text-sm cursor-pointer text-gray-400 hover:text-white">高级：上下文</summary>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2">
          <textarea id="gen-before" class="textarea" placeholder="前文参考（可选）"></textarea>
          <textarea id="gen-after" class="textarea" placeholder="后文参考（可选）"></textarea>
        </div>
      </details>
      <div class="flex gap-2 mt-4">
        <button id="gen-btn" class="btn-primary">开始生成</button>
        <button id="gen-stop" class="btn-ghost hidden">停止</button>
        <button id="gen-clear" class="btn-ghost">清空</button>
      </div>
    </div>

    <div class="card p-4 md:p-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold">生成结果 <span id="gen-status" class="text-xs text-gray-400 ml-2"></span></h2>
        <div class="flex gap-2">
          <button id="copy-all" class="btn-ghost text-sm hidden">复制全部</button>
        </div>
      </div>
      <div id="gen-output" class="space-y-2 min-h-[120px]">
        <p class="text-gray-500 text-sm">尚无结果</p>
      </div>
    </div>
  </section>

  <!-- 素材库页 -->
  <section id="page-assets" class="page hidden">
    <div class="card p-4 md:p-6">
      <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
        <div class="flex gap-2 flex-wrap">
          <button class="tab-btn active asset-type-btn" data-type="character">角色</button>
          <button class="tab-btn asset-type-btn" data-type="scene">场景</button>
          <button class="tab-btn asset-type-btn" data-type="item">物品</button>
          <button class="tab-btn asset-type-btn" data-type="style">风格</button>
        </div>
        <button id="asset-add" class="btn-primary text-sm">+ 新增</button>
      </div>
      <div id="asset-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
    </div>
  </section>

  <!-- 历史记录页 -->
  <section id="page-history" class="page hidden">
    <div class="card p-4 md:p-6">
      <h2 class="font-bold mb-3">历史生成记录</h2>
      <div id="history-list" class="space-y-2"></div>
    </div>
  </section>

  <!-- 批量生成页 -->
  <section id="page-batch" class="page hidden">
    <div class="card p-4 md:p-6 mb-4">
      <label class="block text-sm mb-1">批量任务标题</label>
      <input id="batch-title" class="input mb-3" placeholder="如：我的小说 第一卷" />
      <label class="block text-sm mb-1">长文本（自动按章节切分）</label>
      <textarea id="batch-text" class="textarea" style="min-height:200px" placeholder="粘贴长篇小说，将自动识别“第X章”等格式切分..."></textarea>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
        <div>
          <label class="block text-sm mb-1">切分模式</label>
          <select id="batch-mode" class="select">
            <option value="auto">自动识别</option>
            <option value="chapter">章节标题</option>
            <option value="paragraph">按段落</option>
            <option value="separator">自定义分隔符</option>
          </select>
        </div>
        <div>
          <label class="block text-sm mb-1">自定义分隔符</label>
          <input id="batch-sep" class="input" placeholder="仅当选“自定义”时填" />
        </div>
        <div>
          <label class="block text-sm mb-1">节奏</label>
          <select id="batch-pace" class="select">
            <option value="slow">慢</option>
            <option value="medium" selected>中</option>
            <option value="fast">快</option>
          </select>
        </div>
      </div>
      <div class="flex gap-2 mt-3">
        <button id="batch-preview" class="btn-ghost">预览切分</button>
        <button id="batch-start" class="btn-primary">开始批量生成</button>
        <button id="batch-stop" class="btn-ghost hidden">停止</button>
      </div>
      <div id="batch-preview-box" class="mt-3 hidden">
        <h3 class="text-sm font-bold mb-2">切分预览（共 <span id="batch-count">0</span> 章）</h3>
        <div id="batch-chapters" class="max-h-60 overflow-auto"></div>
      </div>
    </div>

    <div class="card p-4 md:p-6">
      <h2 class="font-bold mb-3">批量任务列表</h2>
      <div id="batch-jobs" class="space-y-2"></div>
    </div>
  </section>

  <!-- 设置页 -->
  <section id="page-settings" class="page hidden">
    <div class="card p-4 md:p-6">
      <h2 class="font-bold mb-3">LLM API 设置</h2>
      <p class="text-xs text-gray-400 mb-4">需要兼容 OpenAI Chat Completions 接口（支持流式）。示例：OpenAI、DeepSeek、硅基流动、OpenRouter 等。</p>
      <label class="block text-sm mb-1">API Base URL</label>
      <input id="api-url" class="input mb-3" placeholder="https://api.deepseek.com/v1/chat/completions" />
      <label class="block text-sm mb-1">API Key</label>
      <input id="api-key" type="password" class="input mb-3" placeholder="sk-..." />
      <label class="block text-sm mb-1">模型名称</label>
      <input id="api-model" class="input mb-3" placeholder="deepseek-chat / gpt-4o / ..." />
      <label class="block text-sm mb-1">温度 Temperature</label>
      <input id="api-temp" type="number" step="0.1" min="0" max="2" class="input mb-4" value="0.7" />
      <div class="flex gap-2">
        <button id="settings-save" class="btn-primary">保存</button>
        <button id="settings-test" class="btn-ghost">测试连接</button>
        <button id="data-export" class="btn-ghost">导出全部数据</button>
        <button id="data-import" class="btn-ghost">导入数据</button>
        <!-- 激活清除按钮已移除：防止买家自行重置试用。换机需联系卖家 -->
        <input id="import-file" type="file" accept=".json" class="hidden" />
      </div>
      <p id="settings-status" class="text-xs text-gray-400 mt-3"></p>
    </div>
  </section>
</div>

<div id="toast-root"></div>
<div id="modal-root"></div>

// 云端激活中心（部署你的云端后把域名改在这里）。留空则退化为纯离线模式。
const ACTIVATION_CENTER_URL = 'http://42.193.100.14:8787';
// 离线宽限：心跳失败时允许的最大本地连续离线秒数（默认 24 小时）
const ACTIVATION_OFFLINE_GRACE = 24 * 3600;

const _b64uDec = s => { s = String(s).replace(/-/g,'+').replace(/_/g,'/'); while (s.length%4) s+='='; const bin = atob(s); const u = new Uint8Array(bin.length); for (let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; };
const _u8ToStr = u => new TextDecoder().decode(u);

async function _sha256Hex(s) {
  const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(h)].map(b => b.toString(16).padStart(2,'0')).join('');
}
async function getDeviceFingerprint() {
  let seed = localStorage.getItem('sb_fp_seed');
  if (!seed) { const u = new Uint8Array(16); crypto.getRandomValues(u); seed = [...u].map(b=>b.toString(16).padStart(2,'0')).join(''); localStorage.setItem('sb_fp_seed', seed); }
  const parts = [navigator.userAgent, navigator.language, screen.width+'x'+screen.height, screen.colorDepth, new Date().getTimezoneOffset(), navigator.hardwareConcurrency || 0, seed, ACT_FP_SALT];
  return (await _sha256Hex(parts.join('|'))).slice(0, 32);
}
async function verifyActivationCode(code) {
  if (!ACTIVATION_PUBLIC_KEY_JWK) return { ok: false, reason: '未配置公钥' };
  const parts = String(code || '').trim().split('.');
  if (parts.length !== 2) return { ok: false, reason: '激活码格式错误' };
  try {
    const jwk = JSON.parse(ACTIVATION_PUBLIC_KEY_JWK);
    const key = await crypto.subtle.importKey('jwk', jwk, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['verify']);
    const payloadBytes = _b64uDec(parts[0]);
    const sig = _b64uDec(parts[1]);
    const ok = await crypto.subtle.verify({ name: 'ECDSA', hash: 'SHA-256' }, key, sig, payloadBytes);
    if (!ok) return { ok: false, reason: '激活码无效或已被篑改' };
    const payload = JSON.parse(_u8ToStr(payloadBytes));
    return { ok: true, payload };
  } catch (e) { return { ok: false, reason: '解析失败：' + e.message }; }
}
// 优先通过后端 API 读写激活状态，避免端口变化/浏览器隐身模式/隐私清理导致丢失
async function _apiGetActivation() {
  try {
    const r = await fetch('/api/activation', { cache: 'no-store' });
    if (!r.ok) return null;
    const text = (await r.text()).trim();
    if (!text || text === 'null') return null;
    return JSON.parse(text);
  } catch (e) { return null; }
}
async function _apiPostActivation(rec) {
  try {
    await fetch('/api/activation', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(rec) });
    return true;
  } catch (e) { return false; }
}
async function _apiDelActivation() {
  try { await fetch('/api/activation', { method: 'DELETE' }); } catch (e) {}
}
// ============ 云端激活中心调用 ============
async function _remoteActivate(code, deviceFp) {
  if (!ACTIVATION_CENTER_URL) return { ok: false, reason: 'no_center', offline: true };
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const r = await fetch(ACTIVATION_CENTER_URL + '/api/activate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, deviceFp }), signal: ctrl.signal
    });
    clearTimeout(timer);
    return await r.json();
  } catch (e) {
    return { ok: false, reason: 'network', offline: true, msg: String(e.message || e) };
  }
}
async function _remoteHeartbeat(code, deviceFp) {
  if (!ACTIVATION_CENTER_URL) return { ok: true, offline: true, skipped: true };
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 6000);
    const r = await fetch(ACTIVATION_CENTER_URL + '/api/heartbeat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, deviceFp }), signal: ctrl.signal
    });
    clearTimeout(timer);
    return await r.json();
  } catch (e) {
    return { ok: false, reason: 'network', offline: true, msg: String(e.message || e) };
  }
}
async function getActivationRecord() {
  const fromFile = await _apiGetActivation();
  if (fromFile && fromFile.code) return fromFile;
  try { return JSON.parse(localStorage.getItem(ACT_LS_KEY) || 'null'); } catch { return null; }
}
async function saveActivationRecord(r) {
  localStorage.setItem(ACT_LS_KEY, JSON.stringify(r));
  await _apiPostActivation(r);
}
async function clearActivationRecord() {
  localStorage.removeItem(ACT_LS_KEY);
  await _apiDelActivation();
}
function _fmtDays(sec) { return Math.max(0, Math.ceil(sec / 86400)); }

async function activationGuard() {
  if (!ACTIVATION_PUBLIC_KEY_JWK) { console.warn('[激活] 未配置公钥，当前为调试模式。'); return true; }
  const rec = await getActivationRecord();
  const fp = await getDeviceFingerprint();
  if (rec && rec.deviceFp === fp && rec.code) {
    const v = await verifyActivationCode(rec.code);
    if (v.ok) {
      const nowSec = Math.floor(Date.now() / 1000);
      const p = v.payload;
      // 防篡改：过期时间严格由签名内数据重算，不信任 activation.json 里的 expiresAt
      const trueExpiresAt = (rec.activatedAt || p.i) + (p.d || 30) * 86400;
      // 防系统时间回拨：比上次见到的时间还小→ 用户改了系统时间
      const lastSeen = rec.lastSeenAt || rec.activatedAt || 0;
      if (nowSec + 60 < lastSeen) {
        console.warn('[激活] 检测到系统时间被回拨，激活已作废');
        await clearActivationRecord();
        return showActivationGate();
      }
      if (nowSec < trueExpiresAt) {
        // 云端心跳校验（防一码多用）
        const hb = await _remoteHeartbeat(rec.code, fp);
        if (hb.ok) {
          rec.lastSeenAt = Math.max(lastSeen, nowSec);
          rec.lastServerOkAt = nowSec;
          rec.expiresAt = hb.expiresAt || trueExpiresAt;
          await saveActivationRecord(rec);
          renderActivationBadge(rec);
          return true;
        }
        // 云端明确拒绝（非网络故障）→ 立即作废
        if (!hb.offline) {
          console.warn('[激活] 云端拒绝：', hb.reason);
          await clearActivationRecord();
          alert('激活已失效：' + _fmtRemoteReason(hb.reason));
          return showActivationGate();
        }
        // 网络故障→ 允许有限离线续用
        const lastOk = rec.lastServerOkAt || rec.activatedAt || 0;
        if (nowSec - lastOk <= ACTIVATION_OFFLINE_GRACE) {
          console.warn('[激活] 云端不可达，已进入离线宽限模式');
          rec.lastSeenAt = Math.max(lastSeen, nowSec);
          rec.expiresAt = trueExpiresAt;
          await saveActivationRecord(rec);
          renderActivationBadge(rec, { offline: true });
          return true;
        }
        console.warn('[激活] 离线宽限已用完，强制联网激活');
        await clearActivationRecord();
        alert('长时间无法联网，需重新激活。\n\n请检查网络连接后再试。');
        return showActivationGate();
      }
    }
  }
  await clearActivationRecord();
  return showActivationGate();
}
function _fmtRemoteReason(r) {
  const m = {
    'code_bound_to_other_device': '该激活码已绑定其他设备，换机请联系卖家',
    'device_mismatch': '设备指纹不匹配，可能在其他电脑上使用过',
    'expired': '激活码已过期',
    'grace_expired': '激活码已过有效的首次激活期',
    'signature_invalid': '激活码签名验证失败',
    'bad_code': '激活码格式错误',
    'bad_code_format': '激活码格式错误',
    'not_activated_yet': '未在云端激活'
  };
  return m[r] || ('未知错误: ' + r);
}
function renderActivationBadge(rec, opts) {
  const header = document.querySelector('header > div');
  if (!header || document.getElementById('act-badge')) return;
  const left = Math.max(0, rec.expiresAt - Math.floor(Date.now() / 1000));
  const days = _fmtDays(left);
  const typeMap = { trial: '测试版', month: '月卡', quarter: '季卡', year: '年卡' };
  const t = typeMap[rec.payload && rec.payload.t] || '卡';
  const el = document.createElement('div');
  el.id = 'act-badge';
  el.style.cssText = 'font-size:11px;color:#94a3b8;margin-top:4px';
  const suffix = (opts && opts.offline) ? ' · 离线宽限' : '';
  el.textContent = `✓ ${t} 已激活 · 剩余 ${days} 天${suffix}`;
  header.appendChild(el);
}

        <p style="color:#94a3b8;font-size:13px;margin:0 0 16px">请输入您购买的激活码，激活后绑定当前设备。</p>
        <textarea id="act-input" placeholder="粘贴激活码..." style="width:100%;min-height:100px;padding:10px;background:#000;border:1px solid rgba(139,92,246,.4);border-radius:6px;color:#a5f3fc;font-family:Consolas,monospace;font-size:12px;outline:none;word-break:break-all;"></textarea>

        <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);color:#64748b;font-size:11px;line-height:1.7">
          <div>• 激活码仅能在第一次激活的设备上使用</div>
          <div>• 如需换设备，请联系商家</div>
          <div id="act-fp" style="margin-top:6px;opacity:.6"></div>

    document.body.appendChild(mask);
    getDeviceFingerprint().then(fp => {

    });
    const input = document.getElementById('act-input');
    const msg = document.getElementById('act-msg');
    const btn = document.getElementById('act-submit');
    btn.onclick = async () => {
      const code = input.value.trim();
      if (!code) { msg.textContent = '请输入激活码'; return; }
      btn.disabled = true; btn.textContent = '验证中...';
      const v = await verifyActivationCode(code);
      if (!v.ok) { msg.textContent = '❌ ' + v.reason; btn.disabled = false; btn.textContent = '激活'; return; }
      const p = v.payload;
      const nowSec = Math.floor(Date.now() / 1000);
      if (p.g && nowSec - p.i > p.g * 86400) { msg.textContent = `❌ 激活码已过安激活期（签发后${p.g}天内必须激活）`; btn.disabled = false; btn.textContent = '激活'; return; }
      const fp = await getDeviceFingerprint();
      // 云端设备绑定（防激活码转发给朋友）
      if (ACTIVATION_CENTER_URL) {
        btn.textContent = '联系服务器...';
        const r = await _remoteActivate(code, fp);
        if (!r.ok) {
          if (r.offline) {
            msg.textContent = '❌ 无法连接激活服务器，请检查网络后重试';
          } else {
            msg.textContent = '❌ ' + _fmtRemoteReason(r.reason);
          }
          btn.disabled = false; btn.textContent = '激活';
          return;
        }
      }
      const rec = { code, payload: p, activatedAt: nowSec, expiresAt: nowSec + (p.d || 30) * 86400, lastSeenAt: nowSec, lastServerOkAt: ACTIVATION_CENTER_URL ? nowSec : 0, deviceFp: fp };
      await saveActivationRecord(rec);
      renderActivationBadge(rec);
      mask.remove();
      resolve(true);
    };
    input.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) btn.click(); });
  });
}

/* =============== 数据层 =============== */
const DB_NAME = 'storyboard_db';
const DB_VERSION = 1;
let _db = null;
function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('assets')) db.createObjectStore('assets', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('generations')) db.createObjectStore('generations', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('batch_jobs')) db.createObjectStore('batch_jobs', { keyPath: 'id', autoIncrement: true });
      if (!db.objectStoreNames.contains('batch_chapters')) {
        const store = db.createObjectStore('batch_chapters', { keyPath: 'id', autoIncrement: true });
        store.createIndex('jobId', 'jobId', { unique: false });
      }
    };
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}
async function dbOp(store, mode, fn) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, mode);
    const os = tx.objectStore(store);
    const result = fn(os);
    tx.oncomplete = () => resolve(result._result !== undefined ? result._result : result);
    tx.onerror = () => reject(tx.error);
    if (result && typeof result.then === 'function') result.then(r => resolve(r)).catch(reject);
  });
}
function dbAll(store) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const req = db.transaction(store).objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}
function dbPut(store, value) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const req = db.transaction(store, 'readwrite').objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbAdd(store, value) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const req = db.transaction(store, 'readwrite').objectStore(store).add(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function dbDel(store, id) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const req = db.transaction(store, 'readwrite').objectStore(store).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}
function dbGet(store, id) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const req = db.transaction(store).objectStore(store).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
function dbByIndex(store, indexName, value) {
  return new Promise(async (resolve, reject) => {
    const db = await openDB();
    const req = db.transaction(store).objectStore(store).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

// 云端提示词：激活后从服务器拉取，仅缓存在内存中，页面刷新需重新拉取
let _cachedSystemPrompt = null;
async function fetchSystemPromptFromServer() {
  if (_cachedSystemPrompt) return _cachedSystemPrompt;
  if (!ACTIVATION_CENTER_URL) return _getLocalPrompt();
  const rec = await getActivationRecord();
  if (!rec || !rec.code) return _getLocalPrompt();
  const fp = await getDeviceFingerprint();
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    const r = await fetch(ACTIVATION_CENTER_URL + '/api/prompt', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: rec.code, deviceFp: fp }), signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await r.json();
    if (data.ok && data.prompt) {
      _cachedSystemPrompt = data.prompt.trim();
      console.log('[提示词] 已从云端加载，长度:', _cachedSystemPrompt.length);
      return _cachedSystemPrompt;
    }
    console.warn('[提示词] 云端返回失败:', data.reason);
  } catch (e) {
    console.warn('[提示词] 云端拉取失败，使用本地:', e.message);
  }
  return _getLocalPrompt();
}
// 本地 XOR 解密 fallback（仅在云端不可用时使用）
const _PROMPT_SK = 'sb-prompt-key-2024-v1-do-not-leak';
function _xorDecryptPrompt(b64) {
  const bin = atob(String(b64).trim());
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i) ^ _PROMPT_SK.charCodeAt(i % _PROMPT_SK.length);
  return new TextDecoder().decode(bytes);
}
function _getLocalPrompt() {
  const enc = document.getElementById('sys-prompt-enc');
  const encText = enc ? enc.textContent.trim() : '';
  if (encText) {
    try { return _xorDecryptPrompt(encText).trim(); }
    catch (e) { console.error('[提示词解密失败]', e); }
  }
  const el = document.getElementById('sys-prompt');
  return el ? el.textContent.trim() : '';
}
// 兼容旧调用：同步版返回缓存或本地
function getSystemPrompt() {
  if (_cachedSystemPrompt) return _cachedSystemPrompt;
  return _getLocalPrompt();
}
function buildUserPrompt({ novelText, assets, pace='medium', styleType, contextBefore, contextAfter }) {
  const characters = assets.filter(a => a.type === 'character');
  const scenes = assets.filter(a => a.type === 'scene');
  const items = assets.filter(a => a.type === 'item');
  const styles = assets.filter(a => a.type === 'style');
  let info = '## 素材信息库\n\n';
  const fmt = (label, arr) => {
    if (!arr.length) return '';
    let s = `### ${label}\n`;
    arr.forEach(a => {
      s += `- 名称：${a.name}`;
      if (a.imageRef) s += ` 映射代码：${a.imageRef}`;
      if (a.aliases) s += ` 别名：${a.aliases}`;
      if (a.description) s += ` 描述：${a.description}`;
      s += '\n';
    });
    return s + '\n';
  };
  info += fmt('角色信息库', characters);
  info += fmt('场景信息库', scenes);
  info += fmt('物品信息库', items);
  info += fmt('风格信息库', styles);
  const paceMap = { slow: '慢节奏：多用远景、空镜、长镜头，留白较多，情绪舒缓', medium: '中等节奏：标准分镜节奏，平衡叙事与情绪', fast: '快节奏：多用特写、快切、短镜头，紧凑有力' };
  let p = info;
  if (contextBefore) p += `## 前文参考\n${contextBefore}\n\n`;
  p += `## 生成参数\n- 节奏：${paceMap[pace] || paceMap.medium}\n`;
  if (styleType) p += `- 风格倾向：${styleType}\n`;
  p += '\n';
  if (contextAfter) p += `## 后文参考\n${contextAfter}\n\n`;
  p += `## 【输入文案】\n\n${novelText}\n\n`;
  p += `请严格按照系统提示词中的输出格式，将以上输入文案转化为分镜提示词。每个分镜块必须用 _::~OUTPUT_START::~_ 开始，_::~FIELD::~_ 分隔 prompt 和 video_prompt，_::~OUTPUT_END::~_ 结束。`;
  return p;
}

// 解析流式输出为分镜块
function parseShots(text) {
  const shots = [];
  const re = /_::~OUTPUT_START::~_([\s\S]*?)(?:_::~OUTPUT_END::~_|$)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const body = m[1];
    const complete = text.indexOf('_::~OUTPUT_END::~_', m.index) !== -1;
    const parts = body.split('_::~FIELD::~_');
    shots.push({
      prompt: (parts[0] || '').trim(),
      videoPrompt: (parts[1] || '').trim(),
      complete,
    });
  }
  return shots;
}

// 章节切分
const CHAPTER_SPLIT_REGEX = /(?=^(?:第[一二三四五六七八九十百千万\d]+[章节回集幕卷篇部]|Chapter\s+\d+|CHAPTER\s+\d+|【第[一二三四五六七八九十百千万\d]+[章节回集幕卷篇部]】|[一二三四五六七八九十]+[、.．]\s*\S|\d+[、.．]\s*\S))/m;
const CHAPTER_PATTERNS = [
  /^第[一二三四五六七八九十百千万\d]+[章节回集幕卷篇部]/m,
  /^Chapter\s+\d+/im,
  /^【第[一二三四五六七八九十百千万\d]+[章节回集幕卷篇部]】/m,
  /^[一二三四五六七八九十]+[、.．]\s*\S/m,
  /^\d+[、.．]\s*\S/m,
];
function detectChapter(text) {
  for (const p of CHAPTER_PATTERNS) {
    const re = new RegExp(p.source, 'gm');
    const ms = text.match(re);
    if (ms && ms.length >= 2) return true;
  }
  return false;
}
function splitByMarker(text) {
  const parts = text.split(CHAPTER_SPLIT_REGEX).filter(p => p.trim());
  return parts.map((part, i) => {
    const title = (part.trim().split('\n')[0] || `章节 ${i+1}`).slice(0, 80);
    return { index: i, title, text: part.trim() };
  });
}
function groupChunks(parts, target=2000) {
  const out = []; let cur = ''; let i = 0;
  for (const p of parts) {
    if (cur && cur.length + p.length > target) {
      out.push({ index: i, title: `段落 ${i+1}`, text: cur.trim() });
      i++; cur = p;
    } else {
      cur += (cur ? '\n\n' : '') + p;
    }
  }
  if (cur.trim()) out.push({ index: i, title: `段落 ${i+1}`, text: cur.trim() });
  return out;
}
function splitChapters(text, mode='auto', separator) {
  const t = text.trim(); if (!t) return [];
  if (mode === 'chapter') return splitByMarker(t);
  if (mode === 'separator') {
    if (!separator) return [{ index: 0, title: '全文', text: t }];
    const ps = t.split(separator).filter(x => x.trim());
    return ps.map((x, i) => ({ index: i, title: (x.trim().split('\n')[0] || `段落 ${i+1}`).slice(0,50), text: x.trim() }));
  }
  if (mode === 'paragraph') {
    const ps = t.split(/\n\s*\n/).filter(x => x.trim());
    if (ps.length <= 1) return [{ index: 0, title: '全文', text: t }];
    return groupChunks(ps);
  }
  // auto
  if (detectChapter(t)) return splitByMarker(t);
  const ps = t.split(/\n\s*\n/).filter(x => x.trim());
  if (ps.length <= 1) return [{ index: 0, title: '全文', text: t }];
  return groupChunks(ps);
}

/* =============== LLM 调用（自动兼容 流式 / 非流式） =============== */
let _abortCtrl = null;
async function streamLLM({ systemPrompt, userPrompt, onDelta, onDone, onError }) {
  const s = getSettings();
  if (!s.apiUrl || !s.apiKey || !s.model) {
    onError(new Error('请先在"API 设置"中配置 URL/Key/模型'));
    return;
  }
  _abortCtrl = new AbortController();
  try {
    const resp = await fetch(s.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${s.apiKey}` },
      signal: _abortCtrl.signal,
      body: JSON.stringify({
        model: s.model,
        stream: true,
        temperature: Number(s.temperature) || 0.7,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt },
        ],
      }),
    });
    if (!resp.ok) {
      const text = await resp.text();
      throw new Error(`API 错误 ${resp.status}: ${text.slice(0, 300)}`);
    }
    const ctype = (resp.headers.get('content-type') || '').toLowerCase();
    // --- 情况 A：非流式 JSON（中转站可能不支持 stream:true）---
    if (ctype.includes('application/json') && !ctype.includes('event-stream')) {
      const obj = await resp.json();
      const content = obj.choices?.[0]?.message?.content
        || obj.choices?.[0]?.text
        || obj.content
        || '';
      if (!content) {
        throw new Error('API 返回为空。原始响应：' + JSON.stringify(obj).slice(0, 400));
      }
      onDelta(content, content);
      onDone(content);
      return;
    }
    // --- 情况 B：标准 SSE 流 ---
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    let rawAll = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      buffer += chunk;
      rawAll += chunk;
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const l = line.trim();
        if (!l) continue;
        // 支持 "data: xxx" 和 裸 JSON 两种行格式
        const payload = l.startsWith('data:') ? l.slice(5).trim() : l;
        if (payload === '[DONE]') continue;
        if (!payload.startsWith('{') && !payload.startsWith('[')) continue;
        try {
          const obj = JSON.parse(payload);
          const delta = obj.choices?.[0]?.delta?.content
            || obj.choices?.[0]?.message?.content
            || obj.choices?.[0]?.text
            || '';
          if (delta) { fullText += delta; onDelta(delta, fullText); }
        } catch {}
      }
    }
    // --- 兜底：流已结束但一个 token 都没解析到 ---
    if (!fullText) {
      // 尝试把整块响应当 JSON 解析（某些中转把整条响应塞进一个 JSON）
      try {
        const obj = JSON.parse(rawAll);
        const content = obj.choices?.[0]?.message?.content || obj.choices?.[0]?.text || obj.content || '';
        if (content) { onDelta(content, content); onDone(content); return; }
      } catch {}
      throw new Error('流式响应未解析出任何内容。请在"API 设置"检查模型名是否正确，或换一个服务商试试。原始前 400 字符：\n' + rawAll.slice(0, 400));
    }
    onDone(fullText);
  } catch (e) {
    if (e.name === 'AbortError') onError(new Error('已取消'));
    else onError(e);
  } finally { _abortCtrl = null; }
}
function abortLLM() { if (_abortCtrl) _abortCtrl.abort(); }

const pages = ['gen', 'assets', 'history', 'batch', 'settings'];
function switchTab(name) {
  pages.forEach(p => document.getElementById('page-' + p).classList.toggle('hidden', p !== name));

function renderShotsTo(container, shots) {
  if (!shots.length) { container.innerHTML = '<p class="text-gray-500 text-sm">尚无结果</p>'; return; }
  container.innerHTML = shots.map((s, i) => `
    <div class="shot-card">
      <div class="flex justify-between mb-2">
        <span class="text-xs text-purple-300 font-bold">分镜 #${i+1} ${s.complete ? '' : '<span class=\"text-yellow-400\">(生成中...)</span>'}</span>
        <div class="flex gap-1">
          <button class="btn-ghost text-xs" data-copy-video="${i}">复制</button>
        </div>
      </div>
      <div>${escapeHtml(s.videoPrompt || '')}</div>
    </div>`).join('');
  container.querySelectorAll('[data-copy-video]').forEach(b => b.addEventListener('click', () => {
    navigator.clipboard.writeText(shots[Number(b.dataset.copyVideo)].videoPrompt); toast('已复制', 'success');
  }));
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let _curShots = [];
let _curFullText = '';
async function startGen() {
  const text = document.getElementById('gen-text').value.trim();
  if (!text) { toast('请输入小说文本', 'error'); return; }
  const pace = document.getElementById('gen-pace').value;
  const styleType = document.getElementById('gen-style').value.trim();
  const contextBefore = document.getElementById('gen-before').value.trim();
  const contextAfter = document.getElementById('gen-after').value.trim();
  const title = document.getElementById('gen-title').value.trim() || text.slice(0, 30);
  const assets = await dbAll('assets');
  const userPrompt = buildUserPrompt({ novelText: text, assets, pace, styleType, contextBefore, contextAfter });
  const output = document.getElementById('gen-output');
  const status = document.getElementById('gen-status');
  status.innerHTML = '<span class="streaming-dot">生成中</span>';
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('gen-stop').classList.remove('hidden');
  document.getElementById('copy-all').classList.add('hidden');
  _curShots = []; _curFullText = '';
  output.innerHTML = '';
  const sysPrompt = await fetchSystemPromptFromServer();
  await streamLLM({
    systemPrompt: sysPrompt,
    userPrompt,
    onDelta: (_d, full) => {
      _curFullText = full;
      _curShots = parseShots(full);
      renderShotsTo(output, _curShots);
    },
    onDone: async (full) => {
      _curFullText = full;
      _curShots = parseShots(full);
      renderShotsTo(output, _curShots);
      status.textContent = `完成 · ${_curShots.length} 个分镜`;
      document.getElementById('gen-btn').disabled = false;
      document.getElementById('gen-stop').classList.add('hidden');
      document.getElementById('copy-all').classList.remove('hidden');
      await dbAdd('generations', {
        title, novelText: text, pace, styleType, result: full, shotCount: _curShots.length,
        status: 'completed', createdAt: Date.now(),
      });
      toast('生成完成并已保存历史', 'success');
    },
    onError: (e) => {
      status.textContent = '失败: ' + e.message;
      document.getElementById('gen-btn').disabled = false;
      document.getElementById('gen-stop').classList.add('hidden');
      toast(e.message, 'error');
    },
  });
}
document.getElementById('gen-btn').addEventListener('click', startGen);
document.getElementById('gen-stop').addEventListener('click', abortLLM);
document.getElementById('gen-clear').addEventListener('click', () => {
  document.getElementById('gen-text').value = '';
  document.getElementById('gen-output').innerHTML = '<p class="text-gray-500 text-sm">尚无结果</p>';
  document.getElementById('gen-status').textContent = '';
  _curShots = []; _curFullText = '';
});
document.getElementById('copy-all').addEventListener('click', () => {
  navigator.clipboard.writeText(_curFullText); toast('已复制全部原始输出', 'success');
});

document.querySelectorAll('.asset-type-btn').forEach(b => b.addEventListener('click', () => {

async function renderAssets() {

    <div class="asset-card">
      <div class="flex gap-3">
        ${a.imageBase64 ? `<img src="${a.imageBase64}" class="w-16 h-16 object-cover rounded" />` : '<div class="w-16 h-16 rounded bg-white/5 flex items-center justify-center text-xs text-gray-500">无图</div>'}
        <div class="flex-1 min-w-0">
          <div class="font-bold truncate">${escapeHtml(a.name)}</div>
          ${a.imageRef ? `<div class="text-xs text-cyan-300">${escapeHtml(a.imageRef)}</div>` : ''}
          ${a.aliases ? `<div class="text-xs text-gray-400">别名：${escapeHtml(a.aliases)}</div>` : ''}
          ${a.description ? `<div class="text-xs text-gray-400 mt-1 line-clamp-2">${escapeHtml(a.description)}</div>` : ''}
        </div>
      </div>
      <div class="flex gap-2 mt-2">
        <button class="btn-ghost text-xs" data-edit="${a.id}">编辑</button>
        <button class="btn-ghost text-xs" data-del="${a.id}">删除</button>
      </div>
    </div>`).join('');
  box.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', async () => {
    const a = await dbGet('assets', Number(b.dataset.edit)); openAssetModal(a);
  }));
  box.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('确定删除？')) return;
    await dbDel('assets', Number(b.dataset.del)); renderAssets(); toast('已删除', 'success');
  }));
}
function openAssetModal(existing) {
  const typeLabels = { character: '角色', scene: '场景', item: '物品', style: '风格' };
  const a = existing || { type: _curAssetType, name: '', description: '', imageRef: '', aliases: '', imageBase64: '' };
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay">
    <div class="modal-box">
      <h3 class="text-lg font-bold mb-3">${existing ? '编辑' : '新增'} ${typeLabels[a.type]}</h3>
      <label class="block text-sm mb-1">名称 *</label>
      <input id="m-name" class="input mb-2" value="${escapeHtml(a.name)}" />
      <label class="block text-sm mb-1">映射代码（如 @图片1）</label>
      <input id="m-ref" class="input mb-2" value="${escapeHtml(a.imageRef || '')}" />
      <label class="block text-sm mb-1">别名（逗号分隔）</label>
      <input id="m-alias" class="input mb-2" value="${escapeHtml(a.aliases || '')}" />
      <label class="block text-sm mb-1">描述</label>
      <textarea id="m-desc" class="textarea mb-2" style="min-height:80px">${escapeHtml(a.description || '')}</textarea>
      <label class="block text-sm mb-1">参考图（可选，本地存储）</label>
      <input id="m-img" type="file" accept="image/*" class="mb-2" />
      ${a.imageBase64 ? `<img src="${a.imageBase64}" class="w-20 h-20 object-cover rounded mb-2" />` : ''}
      <div class="flex gap-2 justify-end mt-4">
        <button id="m-cancel" class="btn-ghost">取消</button>
        <button id="m-save" class="btn-primary">保存</button>
      </div>
    </div></div>`;
  let imgBase64 = a.imageBase64 || '';
  document.getElementById('m-img').addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    if (f.size > 2 * 1024 * 1024) { toast('图片过大（请 <2MB）', 'error'); return; }
    const reader = new FileReader();
    reader.onload = () => { imgBase64 = reader.result; };
    reader.readAsDataURL(f);
  });
  document.getElementById('m-cancel').addEventListener('click', () => root.innerHTML = '');
  document.getElementById('m-save').addEventListener('click', async () => {
    const name = document.getElementById('m-name').value.trim();
    if (!name) { toast('请填写名称', 'error'); return; }
    const obj = {
      type: a.type, name,
      description: document.getElementById('m-desc').value.trim(),
      imageRef: document.getElementById('m-ref').value.trim(),
      aliases: document.getElementById('m-alias').value.trim(),
      imageBase64: imgBase64,
      createdAt: existing ? existing.createdAt : Date.now(),
    };
    if (existing) obj.id = existing.id;
    await dbPut('assets', obj);
    root.innerHTML = ''; renderAssets(); toast('已保存', 'success');
  });
}

/* =============== 批量生成 =============== */
let _batchAbort = false;
document.getElementById('batch-preview').addEventListener('click', () => {
  const text = document.getElementById('batch-text').value;
  const mode = document.getElementById('batch-mode').value;
  const sep = document.getElementById('batch-sep').value;
  const chapters = splitChapters(text, mode, sep);
  document.getElementById('batch-preview-box').classList.remove('hidden');
  document.getElementById('batch-count').textContent = chapters.length;
  document.getElementById('batch-chapters').innerHTML = chapters.map(c =>
    `<div class="chapter-item"><div class="text-sm truncate flex-1">${escapeHtml(c.title)}</div><div class="text-xs text-gray-400">${c.text.length} 字</div></div>`
  ).join('');
});
document.getElementById('batch-start').addEventListener('click', async () => {
  const title = document.getElementById('batch-title').value.trim() || '未命名批量任务';
  const text = document.getElementById('batch-text').value;
  const mode = document.getElementById('batch-mode').value;
  const sep = document.getElementById('batch-sep').value;
  const pace = document.getElementById('batch-pace').value;
  const chapters = splitChapters(text, mode, sep);
  if (!chapters.length) { toast('文本为空', 'error'); return; }
  const jobId = await dbAdd('batch_jobs', {
    title, totalChapters: chapters.length, completedChapters: 0, failedChapters: 0,
    pace, status: 'running', createdAt: Date.now(),
  });
  for (const c of chapters) {
    await dbAdd('batch_chapters', { jobId, chapterIndex: c.index, title: c.title, novelText: c.text, status: 'pending', createdAt: Date.now() });
  }
  toast('批量任务已创建，开始生成', 'success');
  document.getElementById('batch-stop').classList.remove('hidden');
  _batchAbort = false;
  await runBatchJob(jobId, pace);
  document.getElementById('batch-stop').classList.add('hidden');
  renderBatchJobs();
});
document.getElementById('batch-stop').addEventListener('click', () => { _batchAbort = true; abortLLM(); });

async function runBatchJob(jobId, pace) {
  const assets = await dbAll('assets');
  const job = await dbGet('batch_jobs', jobId);
  const chapters = (await dbByIndex('batch_chapters', 'jobId', jobId)).sort((a,b) => a.chapterIndex - b.chapterIndex);
  for (const ch of chapters) {
    if (_batchAbort) { job.status = 'cancelled'; await dbPut('batch_jobs', job); return; }
    ch.status = 'generating'; await dbPut('batch_chapters', ch); renderBatchJobs();
    const up = buildUserPrompt({ novelText: ch.novelText, assets, pace });
    let full = '';
    const batchSysPrompt = await fetchSystemPromptFromServer();
    await new Promise(resolve => {
      streamLLM({
        systemPrompt: batchSysPrompt,
        userPrompt: up,
        onDelta: (_d, f) => { full = f; },
        onDone: async (f) => {
          ch.result = f; ch.shotCount = parseShots(f).length; ch.status = 'completed';
          await dbPut('batch_chapters', ch);
          job.completedChapters = (job.completedChapters || 0) + 1;
          await dbPut('batch_jobs', job); renderBatchJobs(); resolve();
        },
        onError: async (e) => {
          ch.result = full; ch.status = 'failed';
          await dbPut('batch_chapters', ch);
          job.failedChapters = (job.failedChapters || 0) + 1;
          await dbPut('batch_jobs', job); renderBatchJobs();
          toast('章节失败: ' + e.message, 'error'); resolve();
        },
      });
    });
  }
  job.status = job.failedChapters > 0 ? 'failed' : 'completed';
  await dbPut('batch_jobs', job);
}

async function renderBatchJobs() {
  const jobs = (await dbAll('batch_jobs')).sort((a,b) => b.createdAt - a.createdAt);
  const box = document.getElementById('batch-jobs');
  if (!jobs.length) { box.innerHTML = '<p class="text-gray-500 text-sm">暂无批量任务。</p>'; return; }
  const badgeFor = s => ({ pending:'badge-pending', running:'badge-running', completed:'badge-done', failed:'badge-fail', cancelled:'badge-pending' }[s] || 'badge-pending');
  box.innerHTML = jobs.map(j => `
    <div class="chapter-item">
      <div class="min-w-0 flex-1 mr-2">
        <div class="font-bold truncate">${escapeHtml(j.title)} <span class="badge ${badgeFor(j.status)}">${j.status}</span></div>
        <div class="text-xs text-gray-400">${new Date(j.createdAt).toLocaleString()} · 进度 ${j.completedChapters||0}/${j.totalChapters}${j.failedChapters ? ` · 失败 ${j.failedChapters}` : ''}</div>
      </div>
      <div class="flex gap-1">
        <button class="btn-ghost text-xs" data-job-view="${j.id}">查看</button>
        <button class="btn-ghost text-xs" data-job-del="${j.id}">删除</button>
      </div>
    </div>`).join('');
  box.querySelectorAll('[data-job-view]').forEach(b => b.addEventListener('click', () => viewBatchJob(Number(b.dataset.jobView))));
  box.querySelectorAll('[data-job-del]').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('删除任务及其所有章节？')) return;
    const id = Number(b.dataset.jobDel);
    const chs = await dbByIndex('batch_chapters', 'jobId', id);
    for (const c of chs) await dbDel('batch_chapters', c.id);
    await dbDel('batch_jobs', id);
    renderBatchJobs();
  }));
}
async function viewBatchJob(id) {
  const job = await dbGet('batch_jobs', id);
  const chs = (await dbByIndex('batch_chapters', 'jobId', id)).sort((a,b)=>a.chapterIndex-b.chapterIndex);
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay"><div class="modal-box" style="width:min(900px,95vw);">
    <div class="flex justify-between items-center mb-3">
      <h3 class="text-lg font-bold">${escapeHtml(job.title)}</h3>
      <button class="btn-ghost" id="bj-close">关闭</button>
    </div>
    <div id="bj-body" class="space-y-2"></div>
  </div></div>`;
  document.getElementById('bj-close').addEventListener('click', () => root.innerHTML='');
  const body = document.getElementById('bj-body');
  body.innerHTML = chs.map(c => `
    <div class="asset-card">
      <div class="flex justify-between items-center">
        <div class="font-bold truncate">${escapeHtml(c.title || ('章节 '+(c.chapterIndex+1)))} <span class="badge ${({pending:'badge-pending',generating:'badge-running',completed:'badge-done',failed:'badge-fail'}[c.status])}">${c.status}</span></div>
        <div class="flex gap-1">
          <button class="btn-ghost text-xs" data-ch-view="${c.id}">查看</button>
          <button class="btn-ghost text-xs" data-ch-copy="${c.id}">复制</button>
        </div>
      </div>
    </div>`).join('');
  body.querySelectorAll('[data-ch-view]').forEach(b => b.addEventListener('click', async () => {
    const c = await dbGet('batch_chapters', Number(b.dataset.chView));
    const shots = parseShots(c.result || '');
    const inner = document.getElementById('bj-body');
    inner.innerHTML = `<button class="btn-ghost mb-2" id="bj-back">← 返回章节列表</button><h4 class="font-bold mb-2">${escapeHtml(c.title||'')}</h4><div id="bj-shots"></div>`;
    renderShotsTo(document.getElementById('bj-shots'), shots);
    document.getElementById('bj-back').addEventListener('click', () => viewBatchJob(id));
  }));
  body.querySelectorAll('[data-ch-copy]').forEach(b => b.addEventListener('click', async () => {
    const c = await dbGet('batch_chapters', Number(b.dataset.chCopy));
    navigator.clipboard.writeText(c.result || ''); toast('已复制', 'success');
  }));
}

/* =============== 设置页 =============== */
function loadSettingsForm() {
  const s = getSettings();
  document.getElementById('api-url').value = s.apiUrl || '';
  document.getElementById('api-key').value = s.apiKey || '';
  document.getElementById('api-model').value = s.model || '';
  document.getElementById('api-temp').value = s.temperature != null ? s.temperature : 0.7;
}
// 规范化 URL：自动补全 https://、去空格、剥离末尾斜杠、自动补 /chat/completions
function normalizeApiUrl(raw) {
  let u = (raw || '').trim();
  if (!u) return '';
  // 去掉用户可能粘贴进来的引号
  u = u.replace(/^["']+|["']+$/g, '');
  // 如果没有协议头，默认补 https://
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u.replace(/^\/+/, '');
  // 去掉末尾多余斜杠
  u = u.replace(/\/+$/, '');
  // 路径自动补全：只有 host → +/v1/chat/completions；只有 /v1 → +/chat/completions
  try {
    const parsed = new URL(u);
    const p = parsed.pathname;
    if (p === '' || p === '/') {
      u = u + '/v1/chat/completions';
    } else if (/^\/v\d+\/?$/.test(p)) {
      u = u.replace(/\/+$/, '') + '/chat/completions';
    } else if (/\/chat$/.test(p)) {
      u = u + '/completions';
    }
  } catch {}
  return u;
}
function readSettingsForm() {
  return {
    apiUrl: normalizeApiUrl(document.getElementById('api-url').value),
    apiKey: document.getElementById('api-key').value.trim(),
    model: document.getElementById('api-model').value.trim(),
    temperature: Number(document.getElementById('api-temp').value) || 0.7,
  };
}
document.getElementById('settings-save').addEventListener('click', () => {
  const s = readSettingsForm();
  saveSettings(s);
  // 回填规范化后的 URL，让用户看到被自动补全的 https://
  document.getElementById('api-url').value = s.apiUrl;
  toast('已保存设置', 'success');
});
document.getElementById('settings-test').addEventListener('click', async () => {
  const status = document.getElementById('settings-status');
  status.textContent = '测试中...';
  // 直接用表单当前值（自动规范化），同时落盘，避免"改了没保存"导致测的是旧 URL
  const s = readSettingsForm();
  saveSettings(s);
  document.getElementById('api-url').value = s.apiUrl;
  if (!s.apiUrl || !s.apiKey || !s.model) {
    status.textContent = '❌ 请先填写 URL / Key / 模型';
    return;
  }
  try {
    const resp = await fetch(s.apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${s.apiKey}` },
      body: JSON.stringify({ model: s.model, messages: [{ role: 'user', content: '说"你好"' }], max_tokens: 10 }),
    });
    if (!resp.ok) {
      const body = (await resp.text()).slice(0, 300);
      let hint = '';
      if (resp.status === 501 && /localhost|127\.0\.0\.1/i.test(s.apiUrl)) {
        hint = '（请求打到了本地服务器！请检查 URL 是否带 https:// 协议头）';
      } else if (resp.status === 401) {
        hint = '（API Key 错误或已过期）';
      } else if (resp.status === 404) {
        hint = '（URL 路径错误，应为 .../v1/chat/completions）';
      } else if (resp.status === 403) {
        hint = '（无权限，检查 Key 是否有该模型权限）';
      }
      throw new Error('HTTP ' + resp.status + ' ' + hint + ' ' + body);
    }
    status.textContent = '✅ 连接成功，当前 URL: ' + s.apiUrl;
  } catch (e) { status.textContent = '❌ ' + e.message; }
});

document.getElementById('data-export').addEventListener('click', async () => {
  const data = {
    version: 1,
    settings: getSettings(),
    assets: await dbAll('assets'),
    generations: await dbAll('generations'),
    batch_jobs: await dbAll('batch_jobs'),
    batch_chapters: await dbAll('batch_chapters'),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `storyboard-backup-${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('data-import').addEventListener('click', () => document.getElementById('import-file').click());
// 激活清除按钮事件已移除，不再提供即时重置接口
document.getElementById('import-file').addEventListener('change', async (e) => {
  const f = e.target.files[0]; if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    if (data.settings) saveSettings(data.settings);
    for (const store of ['assets', 'generations', 'batch_jobs', 'batch_chapters']) {
      if (Array.isArray(data[store])) {
        for (const row of data[store]) { delete row.id; await dbAdd(store, row); }
      }
    }
    toast('已导入', 'success');
  } catch (err) { toast('导入失败：' + err.message, 'error'); }
});
